services:
  agent:
    build: .
    env_file: .env
    volumes:
      - ./workspace:/tmp/agent_workdir
      - ./logs:/var/log/autogen-agent
    restart: unless-stopped
    # Run in interactive mode by default
    command: ["--interactive"]

